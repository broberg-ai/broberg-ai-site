name: CI — kvalitetsport (Gate A + B)

# F162: Enhver ændring skal passere kvalitetsporten før den må deployes.
# Rød port = STOP → tilbage til udvikling til den er grøn. Ingen naked cutover.
#
#   Gate B (pre-deploy): ingen NY hardcodet, ikke-CMS-redigerbar tekst i src/.
#   Gate A (post-deploy): hvert renderet CMS-felt MED indhold SKAL være inline-redigerbart
#                         (F086 baseline: nye ikke-wirede felter fejler porten → rød på main).
#
# Kræver @webhouse/cms-cli >= 0.4.22 (coverage --baseline + check-text).

on:
  push:
    branches: [main]
  pull_request:

jobs:
  gate:
    name: Kvalitetsport
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Build
        run: bun run build

      - name: Gate B — ingen ny hardcodet tekst uden for CMS
        run: bun run gate:text

  deploy:
    name: Deploy (kun efter grøn port)
    needs: gate
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-broberg-ai
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy til Fly
        # --local-only: byg imaget på runneren (Docker er præinstalleret) og push
        # til app-registry. Undgår org-scoped remote builder → deploy-token forbliver
        # snævert app-scoped (mindst privilegium).
        run: flyctl deploy --local-only -a broberg-ai
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  coverage:
    name: Gate A — inline-edit-dækning (post-deploy)
    needs: deploy
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    env:
      # computeCoverage er ren jsdom — vi behøver ikke playwrights browsere.
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install
        run: bun install --frozen-lockfile
      - name: Vent på ny version er live
        run: sleep 10
      - name: Gate A — hvert CMS-felt med indhold er redigerbart
        run: bun run gate:coverage
